<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap');
    body{margin:0;background:#0d0403;}
    @keyframes flicker{0%,100%{opacity:1}45%{opacity:.85}50%{opacity:1}78%{opacity:.9}}
    @keyframes drift{0%{transform:translateY(0) translateX(0)}50%{transform:translateY(-14px) translateX(6px)}100%{transform:translateY(0) translateX(0)}}
  </style>
</helmet>
<div style="min-height:100vh;width:100%;box-sizing:border-box;position:relative;overflow:hidden;background:radial-gradient(ellipse 90% 70% at 50% 8%, oklch(0.24 0.05 30) 0%, oklch(0.15 0.045 25) 45%, oklch(0.08 0.03 25) 100%);font-family:'Cormorant Garamond',serif;padding:70px 40px 60px;display:flex;flex-direction:column;align-items:center;">

  <div style="position:absolute;inset:0;pointer-events:none;background:repeating-radial-gradient(circle at 20% 30%, oklch(0.9 0.02 85 / 0.03) 0 1px, transparent 1px 3px);opacity:0.5;"></div>
  <div style="position:absolute;width:3px;height:3px;border-radius:50%;background:oklch(0.85 0.1 85 / 0.6);top:14%;left:12%;box-shadow:0 0 8px 2px oklch(0.85 0.1 85 / 0.5);animation:drift 7s ease-in-out infinite;"></div>
  <div style="position:absolute;width:2px;height:2px;border-radius:50%;background:oklch(0.85 0.1 85 / 0.5);top:22%;left:85%;box-shadow:0 0 6px 2px oklch(0.85 0.1 85 / 0.4);animation:drift 9s ease-in-out infinite 1s;"></div>
  <div style="position:absolute;width:2px;height:2px;border-radius:50%;background:oklch(0.85 0.1 85 / 0.5);top:8%;left:60%;box-shadow:0 0 6px 2px oklch(0.85 0.1 85 / 0.4);animation:drift 8s ease-in-out infinite 2s;"></div>

  <h1 style="font-family:'Great Vibes',cursive;font-weight:400;font-size:clamp(40px,6vw,72px);color:oklch(0.82 0.1 85);margin:0 0 8px;text-align:center;text-shadow:0 0 24px oklch(0.7 0.14 70 / 0.45), 0 0 60px oklch(0.5 0.1 40 / 0.3);animation:flicker 6s ease-in-out infinite;">{{ title }}</h1>

  <div style="width:220px;height:1px;background:linear-gradient(90deg, transparent, oklch(0.78 0.09 85 / 0.6), transparent);margin:18px 0 56px;"></div>

  <div style="display:flex;gap:64px;flex-wrap:wrap;justify-content:center;">
    <sc-for list="{{ piles }}" as="pile" hint-placeholder-count="3">
      <div style="display:flex;flex-direction:column;align-items:center;gap:18px;">
        <div style="font-family:'Great Vibes',cursive;font-size:34px;color:oklch(0.82 0.1 85);text-shadow:0 0 12px oklch(0.6 0.12 60 / 0.4);">{{ pile.label }}</div>

        <div onClick="{{ pile.onDraw }}" style-hover="{{ pile.hoverStyle }}" style="position:relative;width:280px;height:420px;cursor:pointer;">
          <div style="position:absolute;inset:0;top:10px;left:8px;border-radius:16px;background:oklch(0.1 0.02 25);border:1px solid oklch(0.5 0.06 70 / 0.35);"></div>
          <div style="position:absolute;inset:0;top:5px;left:4px;border-radius:16px;background:oklch(0.11 0.02 25);border:1px solid oklch(0.55 0.07 70 / 0.45);"></div>

          <div style="position:relative;width:100%;height:100%;transition:transform 0.35s cubic-bezier(.34,1.4,.4,1), box-shadow 0.35s ease;transform:{{ pile.cardScale }};">
            <sc-if value="{{ pile.notFlipped }}" hint-placeholder-val="{{ true }}">
              <div style="position:absolute;inset:0;border-radius:16px;background:linear-gradient(160deg, oklch(0.13 0.025 25), oklch(0.07 0.015 20));border:1px solid oklch(0.72 0.09 82 / 0.55);box-shadow:0 10px 30px oklch(0 0 0 / 0.5), inset 0 0 40px oklch(0.4 0.08 60 / 0.12);display:flex;align-items:center;justify-content:center;">
                <div style="width:64px;height:64px;border-radius:50%;border:1px solid oklch(0.72 0.09 82 / 0.45);display:flex;align-items:center;justify-content:center;font-family:'Great Vibes',cursive;font-size:34px;color:oklch(0.72 0.09 82 / 0.55);">А</div>
              </div>
            </sc-if>
            <sc-if value="{{ pile.flipped }}" hint-placeholder-val="{{ false }}">
              <div style="position:absolute;inset:0;border-radius:16px;background:radial-gradient(ellipse at 30% 20%, oklch(0.88 0.03 85), oklch(0.82 0.035 80) 60%, oklch(0.76 0.04 75) 100%);border:1px solid oklch(0.5 0.07 70 / 0.6);box-shadow:0 10px 26px oklch(0 0 0 / 0.45), inset 0 0 30px oklch(0.4 0.05 60 / 0.15);padding:22px 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;overflow:hidden;">
                <div style="font-size:16px;color:oklch(0.4 0.05 60 / 0.6);letter-spacing:0.2em;flex-shrink:0;">❧</div>
                <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;line-height:1.32;text-align:center;color:oklch(0.28 0.05 40);font-size:{{ pile.fontSize }};overflow-y:auto;max-height:100%;white-space:pre-line;">{{ pile.revealedText }}</div>
                <div style="font-size:16px;color:oklch(0.4 0.05 60 / 0.6);letter-spacing:0.2em;transform:scaleY(-1);flex-shrink:0;">❧</div>
              </div>
            </sc-if>
          </div>
        </div>

      </div>
    </sc-for>
  </div>

  <div style="margin-top:56px;max-width:900px;text-align:center;padding:0 24px;">
    <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:28px;line-height:1.5;color:oklch(0.82 0.06 85);">{{ fullSentence }}</div>

</div>

    "брал(а) интервью у Ханны Тёрнер, и вот что мне удалось у неё выведать:\n\"Как пропала? Куда пропала?!\n*Орущий Максим Галкин в продуктовой тележке: «АЛЛААААААААА!»*\nНачнём по порядку. Я проснулась, потянулась, упала, встала и пошла мыца, а потом п... куда надо, туда и пошла! Да! Потоооооом я училась, училась, училась – устала. Снова поспала. Потом проснулась, помыла Татьяяяяну, побесила Кевина, стырила у Леона носки на завтра. Потом обязательно, ОБЯЗАТЕЛЬНО пожрала, да-даааа! А дальше я не помню, кажется, в меня прилетел Динин каблук.\n#ХДЕ_АРИ?!\""
  ]
};
const LABELS = ["Когда…", "а…", "я…"];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

class Component extends DCLogic {
  state = {
    queues: [shuffle(PHRASES[0]), shuffle(PHRASES[1]), shuffle(PHRASES[2])],
    drawn: [null, null, null],
    counts: [0, 0, 0],
    pop: [false, false, false],
  };

  draw(i) {
    this.setState(s => {
      let queue = s.queues[i];
      let count = s.counts[i];
      if (count >= queue.length) {
        queue = shuffle(PHRASES[i]);
        count = 0;
      }
      const text = queue[count];
      const queues = s.queues.slice(); queues[i] = queue;
      const counts = s.counts.slice(); counts[i] = count + 1;
      const drawn = s.drawn.slice(); drawn[i] = text;
      return { queues, counts, drawn };
    });
    this.setState(s => { const pop = s.pop.slice(); pop[i] = true; return { pop }; });
    setTimeout(() => {
      this.setState(s => { const pop = s.pop.slice(); pop[i] = false; return { pop }; });
    }, 220);
  }

  renderVals() {
    const { drawn, counts, pop } = this.state;
    const piles = [0, 1, 2].map(i => {
      const total = PHRASES[i].length;
      const left = total - counts[i];
      return {
        label: LABELS[i],
        onDraw: () => this.draw(i),
        flipped: !!drawn[i],
        notFlipped: !drawn[i],
        cardScale: pop[i] ? 'scale(0.94)' : 'scale(1)',
        revealedText: drawn[i] || '',
        fontSize: (() => {
          const len = (drawn[i] || '').length;
          if (len > 400) return '13px';
          if (len > 260) return '15px';
          if (len > 160) return '17px';
          if (len > 80) return '20px';
          return '23px';
        })(),
        remainingLabel: left + (left === 1 ? ' карта осталась' : left >= 2 && left <= 4 ? ' карты осталось' : ' карт осталось'),
        hoverStyle: { filter: 'brightness(1.08)' },
      };
    });
    const t = drawn;
    const fullSentence = `Когда ${t[0] || '…'}, а ${t[1] || '…'}, я ${t[2] || '…'}.`;
    return {
      title: 'Что вы делали, когда пропала Ари?',
      piles,
      fullSentence,
    };
  }
}
</script>
