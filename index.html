const LABELS = ["Когда…", "а…", "я…"];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const state = {
  queues: [shuffle(PHRASES[0]), shuffle(PHRASES[1]), shuffle(PHRASES[2])],
  drawn: [null, null, null],
  counts: [0, 0, 0],
};

function fontSizeFor(text) {
  const len = (text || '').length;
  if (len > 400) return '13px';
  if (len > 260) return '15px';
  if (len > 160) return '17px';
  if (len > 80) return '20px';
  return '23px';
}

function updateSentence() {
  const t = state.drawn;
  document.getElementById('sentence').textContent =
    `Когда ${t[0] || '…'}, а ${t[1] || '…'}, я ${t[2] || '…'}.`;
}

function draw(i) {
  let queue = state.queues[i];
  let count = state.counts[i];
  if (count >= queue.length) {
    queue = shuffle(PHRASES[i]);
    count = 0;
    state.queues[i] = queue;
  }
  const text = queue[count];
  state.counts[i] = count + 1;
  state.drawn[i] = text;

  const cardInner = document.getElementById('card-inner-' + i);
  const content = document.getElementById('content-' + i);
  const revealedText = document.getElementById('revealed-' + i);

  cardInner.classList.add('pop');
  setTimeout(() => cardInner.classList.remove('pop'), 220);

  revealedText.textContent = text;
  revealedText.style.fontSize = fontSizeFor(text);
  content.classList.add('shown');

  updateSentence();
}

function buildPiles() {
  const container = document.getElementById('piles');
  for (let i = 0; i < 3; i++) {
    const pile = document.createElement('div');
    pile.className = 'pile';
    pile.innerHTML = `
      <div class="pile-label">${LABELS[i]}</div>
      <div class="stack" onclick="draw(${i})">
        <div class="back-layer l1"></div>
        <div class="back-layer l2"></div>
        <div class="card-inner" id="card-inner-${i}">
          <div class="cover"><div class="monogram">А</div></div>
          <div class="content" id="content-${i}">
            <div class="ornament">❧</div>
            <div class="revealed-text" id="revealed-${i}"></div>
            <div class="ornament flip">❧</div>
          </div>
        </div>
      </div>
    `;
    container.appendChild(pile);
  }
}

buildPiles();
updateSentence();
</script>
